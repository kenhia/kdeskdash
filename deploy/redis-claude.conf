# Redis claude-feed instance (kdeskdash) — rpidash2:6380
#
# Second, LAN-reachable Redis holding ONLY the claude:* namespace (agent activity
# published by Claude Code hooks/statusline across the fleet). Deliberately separate
# from the localhost-only control instance on 6379 so mode-control keys are never
# exposed to the network. Trusted home LAN: no auth (matches the telemetry instance
# posture); ephemeral data only, so persistence is disabled outright.

port 6380
bind 0.0.0.0
protected-mode no

# Ephemeral feed: session hashes carry a TTL, recent list is LTRIMmed.
save ""
appendonly no

maxmemory 32mb
maxmemory-policy allkeys-lru

dir /var/lib/redis-claude
logfile ""
daemonize no
